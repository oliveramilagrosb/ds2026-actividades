<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria - Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body> 
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img/libro.jpg" 
                    alt="Libreria Logo" 
                    width="60" 
                    height="60" 
                    class="d-inline-block me-3">
                <span class="fs-3 fw-bold titulo-pixi">Libreria Pixi</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalogo.html">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card shadow card-pixi p-4">
                    <h2 class="text-center mb-4 titulo-pixi">Contactanos</h2>
                    <p class="text-center text-muted mb-4">¿Tenés alguna pregunta? ¡Escribinos!</p>
                    
                    <form id="contacto-form">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre</label>
                            <input type="text" class="form-control input-pixi" id="nombre" required placeholder="Tu nombre completo">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control input-pixi" id="email" required placeholder="nombre@correo.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="asunto" class="form-label fw-bold">Asunto</label>
                            <select class="form-select input-pixi" id="asunto" required>
                                <option value="" selected disabled>Seleccioná un motivo...</option>
                                <option value="consulta">Consulta</option>
                                <option value="reclamo">Reclamo</option>
                                <option value="sugerencia">Sugerencia</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label fw-bold">Mensaje</label>
                            <textarea class="form-control input-pixi" id="mensaje" rows="4" required placeholder="Escribí tu mensaje acá..."></textarea>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-pixi btn-lg">Enviar Mensaje</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>

</body>

</html>
