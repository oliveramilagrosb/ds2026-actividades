<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreria - Catálogo </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>  
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img/libro.jpg" 
                    alt="Libreria Logo" 
                    width="60" 
                    height="60" 
                    class="d-inline-block me-3">
                <span class="fs-3 fw-bold titulo-pixi">Libreria Pixi</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalogo.html">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <main class="container my-5">
        <h2 class="text-center mb-4 titulo-pixi">Buscador de Libros</h2>
    
        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <form id="busqueda-form" class="input-group shadow-sm">
                    <input type="text" id="buscador" class="form-control border-pixi" placeholder="Escribí un título o autor..." style="border: 2px solid #e0b1cb; border-radius: 0;">
                    <button class="btn btn-pixi" type="submit" id="buscar">Buscar</button>
                </form>
                <p id="loading" class="text-center mt-3 fw-bold" style="display: none; color: #9d4edd;">Buscando en la biblioteca... ✨</p>
                <p id="error-msg" class="text-center mt-3 text-danger fw-bold"></p>
            </div>
        </div>

        <div class="row g-4" id="resultados">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>

</body>


</html>
